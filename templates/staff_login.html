<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Police Staff Portal | Smart Tourist</title>
    <style>
        :root {
            --police-navy: #0f172a;
            --police-blue: #1e40af;
            --police-light: #3b82f6;
            --alert-red: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--police-navy);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(30, 64, 175, 0.15) 0px, transparent 50%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-card {
            background: rgba(30, 41, 59, 0.7); /* Glass effect */
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .badge-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--police-blue), var(--police-navy));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 24px;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        h2 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--police-light);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--police-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        button:hover {
            background: var(--police-light);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .alert-message {
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            text-align: center;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .alert-success {
            background: rgba(46, 213, 115, 0.1);
            border: 1px solid rgba(46, 213, 115, 0.3);
            color: #2ed573;
        }

        .footer {
            margin-top: 24px;
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <div class="header">
                <div class="badge-icon">🛡️</div>
                <h2>Staff Portal</h2>
                <p class="subtitle">Smart Tourist Command Center</p>
            </div>

            <form method="POST">
                {% csrf_token %}
                
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert-message {% if message.tags == 'success' %}alert-success{% else %}alert-error{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}

                {% if form.non_field_errors %}
                    <div class="alert-message alert-error">
                        {{ form.non_field_errors.0 }}
                    </div>
                {% endif %}

                <div class="form-group">
                    <label for="id_username">Badge ID / Username</label>
                    <input type="text" name="username" id="id_username" required placeholder="Enter credentials">
                </div>

                <div class="form-group">
                    <label for="id_password">Secure Access Key</label>
                    <input type="password" name="password" id="id_password" required placeholder="••••••••">
                </div>

                <button type="submit">Initialize Session</button>
            </form>

            <div class="footer">
                Authorized Personnel Only.<br>
                Access is monitored and logged.
            </div>
        </div>
    </div>

</body>
</html>
