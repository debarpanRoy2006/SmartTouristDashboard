<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Safety Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5 text-center">
        <h2 class="mb-4">🛡 Travel Safety Hub</h2>
        <form method="POST" class="d-flex justify-content-center mb-5 gap-2">
            {% csrf_token %}
            <input type="text" name="city" class="form-control w-50" placeholder="Enter City Name">
            <button class="btn btn-success" type="submit">Assess</button>
        </form>

        {% if assessment %}
        <div class="card shadow mx-auto" style="max-width: 600px;">
            <div class="card-body">
                <h3 class="card-title">{{ assessment.city|title }}</h3>
                <div class="display-4 fw-bold text-success">{{ assessment.score }}/100</div>
                <p class="text-muted">Safety Rating</p>
                <div class="alert alert-info text-start mt-3">
                    <strong>AI Safety Tips:</strong><br>
                    {{ assessment.tips|linebreaks }}
                </div>
            </div>
        </div>
        {% endif %}
        <br>
        <a href="{% url 'dashboard' %}" class="text-decoration-none">Return to Dashboard</a>
    </div>
</body>
</html>
