<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Destination Explorer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>📸 Explorer: {{ query|title }}</h2>
            <a href="{% url 'dashboard' %}" class="btn btn-secondary">Back to Dashboard</a>
        </div>
        
        <form method="GET" class="input-group mb-5">
            <input type="text" name="query" class="form-control" placeholder="Search a new place...">
            <button class="btn btn-primary" type="submit">Search</button>
        </form>

        <div class="row g-4">
            {% for img in images %}
            <div class="col-md-4">
                <div class="card border-0 shadow-sm">
                    <img src="{{ img.urls.regular }}" class="card-img-top" style="height: 250px; object-fit: cover;">
                    <div class="card-body p-2 text-center">
                        <small class="text-muted">Photo by {{ img.user.name }}</small>
                    </div>
                </div>
            </div>
            {% empty %}
            <p class="text-center">No images found. Try a different search term.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
