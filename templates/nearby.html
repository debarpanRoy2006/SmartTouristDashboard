<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nearby Gems | Travel Companion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    
    <style>
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; }
        #map { height: 400px; border-radius: 15px; margin-bottom: 20px; z-index: 1; }
        .gemini-response { white-space: pre-wrap; line-height: 1.6; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #0dcaf0; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-info"><i class="bi bi-geo-alt-fill"></i> Nearby Attractions</h2>
            <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary btn-sm">Back to Dashboard</a>
        </div>

        <div class="row g-4">
            <div class="col-lg-7">
                <div class="card shadow-sm border-0 p-3">
                    <div id="map"></div>
                    <button id="findMeBtn" class="btn btn-info text-white fw-bold w-100">
                        <i class="bi bi-cursor-fill"></i> Get My Current Location
                    </button>
                </div>
            </div>

            <div class="col-lg-5">
                <div class="card shadow-sm border-0 h-100 p-4">
                    <h4 class="fw-semibold mb-3">✨ AI Recommendations</h4>
                    <p class="text-muted small">Click the button on the left to allow location access and see what's cool around you.</p>
                    
                    <div id="aiLoader" class="loader mx-auto my-3"></div>
                    
                    <div id="nearbyResult" class="mt-2 p-3 bg-light rounded" style="min-height: 200px;">
                        <p id="statusMessage" class="text-center text-muted m-auto">Waiting for location...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map = L.map('map').setView([20, 0], 2); // Initial global view
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        const findMeBtn = document.getElementById('findMeBtn');
        const statusMessage = document.getElementById('statusMessage');
        const aiLoader = document.getElementById('aiLoader');
        const nearbyResult = document.getElementById('nearbyResult');

        findMeBtn.addEventListener('click', () => {
            if (!navigator.geolocation) {
                alert("Geolocation is not supported by your browser.");
                return;
            }

            statusMessage.innerText = "Locating...";
            aiLoader.style.display = "block";
            nearbyResult.innerHTML = "";

            navigator.geolocation.getCurrentPosition(async (position) => {
                const { latitude, longitude } = position.coords;
                
                // Update Map
                map.setView([latitude, longitude], 14);
                L.marker([latitude, longitude]).addTo(map)
                    .bindPopup('You are here!')
                    .openPopup();

                // Fetch AI Suggestions from backend
                // Since this uses the Gemini API, we send the coords to your Django view
                try {
                    const response = await fetch(`/api/nearby-ai/?lat=${latitude}&lon=${longitude}`);
                    const data = await response.json();
                    
                    aiLoader.style.display = "none";
                    nearbyResult.innerHTML = `<div class="gemini-response small">${data.suggestions}</div>`;
                } catch (error) {
                    aiLoader.style.display = "none";
                    nearbyResult.innerHTML = `<p class="text-danger small">Error fetching AI suggestions. Make sure your API key is set.</p>`;
                }

            }, () => {
                aiLoader.style.display = "none";
                statusMessage.innerText = "Location access denied.";
            });
        });
    </script>
</body>
</html>
