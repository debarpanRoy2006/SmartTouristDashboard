<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Travel Map</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>#map { height: 600px; border-radius: 15px; }</style>
</head>
<body class="bg-dark text-white">
    <div class="container py-5">
        <div class="d-flex justify-content-between mb-3">
            <h3>🌍 Global Travel Map</h3>
            <a href="{% url 'dashboard' %}" class="btn btn-light">Exit Map</a>
        </div>
        <div id="map" class="shadow-lg"></div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([20.5937, 78.9629], 5); // Focused on India
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    </script>
</body>
</html>
