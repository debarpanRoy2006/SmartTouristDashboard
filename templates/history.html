<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Stats</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="d-flex justify-content-between mb-4">
            <h2>📊 Your Travel History</h2>
            <a href="{% url 'dashboard' %}" class="btn btn-outline-dark">Home</a>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="card bg-primary text-white p-4 text-center mb-4">
                    <h5>Average Safety Experience</h5>
                    <div class="display-3 fw-bold">{{ avg_score }}%</div>
                </div>
            </div>
            <div class="col-md-8">
                <ul class="list-group shadow-sm">
                    {% for trip in past_trips %}
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        {{ trip.name }}
                        <span class="badge bg-success rounded-pill">Score: {{ trip.score }}</span>
                    </li>
                    {% endfor %}
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
